name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - uses: azure/setup-kubectl@v4
      - name: Create kind cluster
        uses: helm/kind-action@v1
      - name: Run e2e tests
        run: go test -tags e2e -v -timeout 300s ./internal/e2e/

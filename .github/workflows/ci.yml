name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      # Build golangci-lint from source with this job's Go toolchain. The action's
      # prebuilt binary lags new Go releases and refuses to lint a module whose
      # go directive is newer than golangci-lint's own build Go version.
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run

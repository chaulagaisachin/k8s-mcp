name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
